name: run-daledou

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 00:00 UTC 运行（北京时间 08:00）
  workflow_dispatch:  # 手动触发

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 创建配置文件
        run: |
          mkdir -p config
          echo "DALEDOU_COOKIE: ${{ secrets.DALEDOU_COOKIE }}" > config/settings.yaml

      - name: 运行大乐斗脚本
        run: |
          python main.py --timing

      - name: 上传日志（可选）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daledou-log
          path: logs/
